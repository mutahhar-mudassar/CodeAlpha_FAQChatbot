<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ Chatbot – NLP Powered</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f97316;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --user-bubble: #7c6af7;
    --bot-bubble: #1a1a28;
    --success: #22d3a5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(124,106,247,0.08) 0%, transparent 60%);
  }
  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(124,106,247,0.4);
    position: relative;
    flex-shrink: 0;
  }
  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    position: absolute;
    bottom: -2px; right: -2px;
    border: 2px solid var(--panel);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,165,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(34,211,165,0); }
  }
  .header-info { flex: 1; }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-sub {
    font-size: 11px;
    color: var(--success);
    margin-top: 2px;
    font-style: italic;
  }
  .nlp-badge {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent2);
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.25);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .topic-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .topic-bar::-webkit-scrollbar { display: none; }
  .topic-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .topic-btn:hover { border-color: var(--accent); color: var(--text); }
  .topic-btn.active {
    background: rgba(124,106,247,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-avatar.bot { background: linear-gradient(135deg, var(--accent), #a855f7); }
  .msg-avatar.user { background: rgba(124,106,247,0.2); border: 1px solid var(--accent); }

  .msg-content { max-width: 75%; }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg-row.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
    color: #fff;
    text-align: right;
  }
  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }
  .msg-row.user .msg-meta { text-align: right; }

  .confidence-bar {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
  }
  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .score-label { min-width: 36px; text-align: right; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .suggestion-chip {
    padding: 6px 12px;
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(124,106,247,0.05);
  }
  .suggestion-chip:hover {
    background: rgba(124,106,247,0.15);
    border-color: var(--accent);
  }

  .nlp-card {
    background: rgba(249,115,22,0.05);
    border: 1px solid rgba(249,115,22,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 11px;
  }
  .nlp-card-title {
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .nlp-tokens {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .token {
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.2);
    color: #fbbf24;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
  }
  .token.stop { opacity: 0.35; text-decoration: line-through; }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-wrapper { flex: 1; position: relative; }
  .chat-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    max-height: 100px;
    line-height: 1.5;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: white;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #6b5ce7; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .welcome-card {
    background: linear-gradient(135deg, rgba(124,106,247,0.1), rgba(168,85,247,0.05));
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 8px;
  }
  .welcome-icon { font-size: 36px; margin-bottom: 12px; }
  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .welcome-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .no-match {
    background: rgba(239,68,68,0.05);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 12px;
    color: #f87171;
  }
</style>
</head>
<body>

<div class="header">
  <div class="bot-avatar">🤖<div class="pulse-dot"></div></div>
  <div class="header-info">
    <div class="header-title">FAQ·BOT</div>
    <div class="header-sub">● NLP-Powered · Cosine Similarity Matching</div>
  </div>
  <div class="nlp-badge">NLP</div>
</div>

<div class="topic-bar">
  <button class="topic-btn active" onclick="switchTopic('ecommerce', this)">🛒 E-Commerce</button>
  <button class="topic-btn" onclick="switchTopic('tech', this)">💻 Tech Support</button>
  <button class="topic-btn" onclick="switchTopic('university', this)">🎓 University</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="Type your question..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
// ─────────────────────────────────────────────
//  FAQ DATASETS
// ─────────────────────────────────────────────
const FAQ_DB = {
  ecommerce: [
    { q: "How do I track my order?", a: "You can track your order by visiting the 'My Orders' section in your account dashboard. A tracking link is also emailed to you once your item ships." },
    { q: "What is the return policy?", a: "We offer a 30-day hassle-free return policy. Items must be unused and in original packaging. Initiate a return from the Orders page." },
    { q: "How long does shipping take?", a: "Standard shipping takes 5–7 business days. Express shipping (2–3 days) and next-day delivery are also available at checkout." },
    { q: "Can I cancel my order?", a: "Orders can be cancelled within 1 hour of placement. After that, you may need to wait for delivery and initiate a return." },
    { q: "Do you ship internationally?", a: "Yes! We ship to 40+ countries. International shipping typically takes 10–15 business days, with duties and taxes collected at checkout." },
    { q: "How do I apply a discount code?", a: "Enter your promo code in the 'Apply Coupon' field at checkout, then click 'Apply'. The discount will reflect in your order total." },
    { q: "What payment methods do you accept?", a: "We accept Visa, Mastercard, American Express, PayPal, Apple Pay, Google Pay, and bank transfers." },
    { q: "Is my payment information secure?", a: "Yes. We use 256-bit SSL encryption and are PCI-DSS compliant. Your card details are never stored on our servers." },
    { q: "How do I change my delivery address?", a: "You can update your address before the order ships by going to My Orders → Order Details → Edit Address." },
    { q: "What should I do if my item arrives damaged?", a: "Please take photos of the damage and contact our support within 48 hours. We'll arrange a replacement or refund right away." }
  ],
  tech: [
    { q: "How do I reset my password?", a: "Click 'Forgot Password' on the login page, enter your email, and follow the reset link sent to your inbox." },
    { q: "Why is the app running slowly?", a: "Try clearing the app cache, restarting the device, or reinstalling the app. Also ensure you're running the latest version." },
    { q: "How do I enable two-factor authentication?", a: "Go to Settings → Security → Two-Factor Authentication and follow the setup steps using an authenticator app or SMS." },
    { q: "My account is locked, what do I do?", a: "Accounts lock after 5 failed login attempts. Wait 15 minutes and try again, or contact support to unlock manually." },
    { q: "How do I export my data?", a: "Navigate to Settings → Privacy → Export Data. You'll receive a downloadable ZIP with all your data within 24 hours." },
    { q: "Can I use the app offline?", a: "Yes, core features work offline. Your data syncs automatically when you reconnect to the internet." },
    { q: "What browsers are supported?", a: "We support Chrome (v90+), Firefox (v85+), Safari (v14+), and Edge (v90+). Internet Explorer is not supported." },
    { q: "How do I contact technical support?", a: "Reach our tech support team via live chat (24/7), email at support@techapp.com, or call +1-800-TECH-HELP." },
    { q: "How do I delete my account?", a: "Go to Settings → Account → Delete Account. Note that this action is irreversible and all data will be permanently removed." },
    { q: "Why am I not receiving email notifications?", a: "Check your spam folder, then verify notification settings in your profile. Also whitelist our domain in your email client." }
  ],
  university: [
    { q: "How do I register for courses?", a: "Log into the student portal, navigate to Course Registration, select your semester, and add courses before the registration deadline." },
    { q: "What is the fee submission deadline?", a: "Fee submission is due by the 15th of each semester's first month. Late payments incur a 5% surcharge." },
    { q: "How do I get a transcript?", a: "Submit a transcript request form at the registrar's office or online portal. Processing takes 3–5 working days." },
    { q: "What is the attendance policy?", a: "A minimum of 75% attendance is required per course. Students below this threshold are not eligible to appear in final exams." },
    { q: "How do I apply for a scholarship?", a: "Fill out the scholarship application form on the financial aid portal before the deadline. Merit and need-based options are available." },
    { q: "Where is the library located?", a: "The main library is in Building C, Ground Floor. It's open Monday–Saturday, 8 AM to 9 PM." },
    { q: "How do I appeal a grade?", a: "Submit a grade appeal form to your department within 7 days of result announcement with a written justification." },
    { q: "What documents are needed for admission?", a: "You'll need matric and intermediate certificates, a domicile certificate, CNIC copy, passport photos, and your entrance test result." },
    { q: "Is on-campus accommodation available?", a: "Yes, separate hostels for male and female students are available. Apply through the Student Affairs Office before the semester starts." },
    { q: "How do I join a student society?", a: "Visit the Student Affairs Office or contact the society directly. Most societies open recruitment at the start of each semester." }
  ]
};

// ─────────────────────────────────────────────
//  NLP ENGINE
// ─────────────────────────────────────────────
const STOP_WORDS = new Set([
  'a','an','the','is','it','in','on','at','to','do','i','my','me','we',
  'our','you','your','he','she','they','their','this','that','these','those',
  'and','or','but','for','of','with','about','how','what','when','where',
  'why','which','who','can','could','would','should','will','am','are','was',
  'were','be','been','being','have','has','had','did','does','not','no','so',
  'if','then','than','very','just','also','from','by','up','out','as','into',
  'get','got','its','yes','some','any','all','more','there','here','much','many'
]);

function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, '')
    .split(/\s+/)
    .filter(w => w.length > 1);
}

function removeStopWords(tokens) {
  return tokens.filter(t => !STOP_WORDS.has(t));
}

function stem(word) {
  if (word.length <= 3) return word;
  if (word.endsWith('ing')) return word.slice(0, -3) || word;
  if (word.endsWith('tion')) return word.slice(0, -4) || word;
  if (word.endsWith('ness')) return word.slice(0, -4) || word;
  if (word.endsWith('ment')) return word.slice(0, -4) || word;
  if (word.endsWith('ed')) return word.slice(0, -2) || word;
  if (word.endsWith('ly')) return word.slice(0, -2) || word;
  if (word.endsWith('er')) return word.slice(0, -2) || word;
  if (word.endsWith('es') && word.length > 4) return word.slice(0, -2) || word;
  if (word.endsWith('s') && word.length > 4) return word.slice(0, -1) || word;
  return word;
}

function preprocess(text) {
  return removeStopWords(tokenize(text)).map(stem);
}

function buildTFVector(terms, vocab) {
  const freq = {};
  terms.forEach(t => freq[t] = (freq[t] || 0) + 1);
  return vocab.map(v => freq[v] || 0);
}

function cosineSimilarity(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  if (magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function findBestMatch(userInput, faqs) {
  const userTokens = tokenize(userInput);
  const userFiltered = removeStopWords(userTokens);
  const userStemmed = userFiltered.map(stem);

  const allTerms = new Set(userStemmed);
  faqs.forEach(faq => preprocess(faq.q + ' ' + faq.a).forEach(w => allTerms.add(w)));
  const vocab = Array.from(allTerms);

  const userVec = buildTFVector(userStemmed, vocab);
  let best = null, bestScore = 0;

  faqs.forEach(faq => {
    const faqVec = buildTFVector(preprocess(faq.q + ' ' + faq.a), vocab);
    const score = cosineSimilarity(userVec, faqVec);
    if (score > bestScore) { bestScore = score; best = { faq, score }; }
  });

  return { match: best, userTokens, userFiltered, userStemmed };
}

// ─────────────────────────────────────────────
//  STATE & UI
// ─────────────────────────────────────────────
let currentTopic = 'ecommerce';

function switchTopic(topic, btn) {
  currentTopic = topic;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('chatArea').innerHTML = '';
  addWelcome();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function addWelcome() {
  const area = document.getElementById('chatArea');
  const names = { ecommerce: 'E-Commerce', tech: 'Tech Support', university: 'University' };
  const icons = { ecommerce: '🛒', tech: '💻', university: '🎓' };
  const faqs = FAQ_DB[currentTopic];
  const chips = faqs.slice(0, 4).map(f =>
    `<span class="suggestion-chip" onclick="fillInput('${f.q.replace(/'/g, "\\'")}')">${f.q.substring(0, 40)}${f.q.length > 40 ? '...' : ''}</span>`
  ).join('');
  area.innerHTML = `
    <div class="welcome-card">
      <div class="welcome-icon">${icons[currentTopic]}</div>
      <div class="welcome-title">${names[currentTopic]} Assistant</div>
      <div class="welcome-sub">Powered by <strong>TF-IDF Cosine Similarity</strong> + <strong>NLP Preprocessing</strong><br>Ask me anything about ${names[currentTopic].toLowerCase()}.</div>
    </div>
    <div class="msg-row bot" style="align-items:flex-start">
      <div class="msg-avatar bot">🤖</div>
      <div class="msg-content">
        <div class="msg-bubble">Hello! I use <em>tokenization, stop-word removal, stemming, and cosine similarity</em> to find the best match for your question.<br><br>Try one of these:</div>
        <div class="suggestions">${chips}</div>
      </div>
    </div>`;
  scrollToBottom();
}

function fillInput(text) {
  const inp = document.getElementById('chatInput');
  inp.value = text;
  inp.focus();
  autoResize(inp);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getConfidenceColor(score) {
  if (score >= 0.6) return '#22d3a5';
  if (score >= 0.3) return '#fbbf24';
  return '#f87171';
}

function getConfidenceLabel(score) {
  if (score >= 0.6) return 'High confidence';
  if (score >= 0.3) return 'Moderate confidence';
  if (score >= 0.1) return 'Low confidence';
  return 'No match';
}

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  autoResize(inp);
  document.getElementById('sendBtn').disabled = true;
  const area = document.getElementById('chatArea');

  area.innerHTML += `
    <div class="msg-row user">
      <div class="msg-avatar user">👤</div>
      <div class="msg-content">
        <div class="msg-bubble">${text}</div>
        <div class="msg-meta">${getTime()}</div>
      </div>
    </div>`;
  scrollToBottom();

  const typingId = 'typing-' + Date.now();
  area.innerHTML += `
    <div class="msg-row bot" id="${typingId}" style="align-items:center">
      <div class="msg-avatar bot">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>`;
  scrollToBottom();

  await new Promise(r => setTimeout(r, 700 + Math.random() * 400));

  const faqs = FAQ_DB[currentTopic];
  const { match, userTokens, userFiltered, userStemmed } = findBestMatch(text, faqs);
  document.getElementById(typingId)?.remove();

  const THRESHOLD = 0.08;
  let responseHTML = '';

  if (match && match.score >= THRESHOLD) {
    const pct = Math.round(match.score * 100);
    const color = getConfidenceColor(match.score);
    const label = getConfidenceLabel(match.score);
    const related = faqs.filter(f => f.q !== match.faq.q).slice(0, 3)
      .map(f => `<span class="suggestion-chip" onclick="fillInput('${f.q.replace(/'/g, "\\'")}')">${f.q.substring(0, 35)}...</span>`).join('');
    responseHTML = `
      <div class="msg-row bot" style="align-items:flex-start">
        <div class="msg-avatar bot">🤖</div>
        <div class="msg-content" style="max-width:80%">
          <div class="msg-bubble">
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-style:italic">📋 Matched: "${match.faq.q}"</div>
            ${match.faq.a}
          </div>
          <div class="confidence-bar">
            <span>${label}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
            <span class="score-label" style="color:${color}">${pct}%</span>
          </div>
          <div class="nlp-card">
            <div class="nlp-card-title">▸ NLP PIPELINE TRACE</div>
            <div class="nlp-tokens">${userTokens.map(t => `<span class="token ${STOP_WORDS.has(t)?'stop':''}">${t}</span>`).join('')}</div>
            <div style="margin-top:6px;color:var(--muted);font-size:10px">Stemmed: ${userStemmed.join(', ')||'—'} · Cosine: ${match.score.toFixed(4)}</div>
          </div>
          <div class="suggestions" style="margin-top:10px">
            <span style="font-size:10px;color:var(--muted);align-self:center">Related:</span>${related}
          </div>
          <div class="msg-meta">${getTime()}</div>
        </div>
      </div>`;
  } else {
    responseHTML = `
      <div class="msg-row bot" style="align-items:flex-start">
        <div class="msg-avatar bot">🤖</div>
        <div class="msg-content" style="max-width:80%">
          <div class="msg-bubble">Hmm, I couldn't find a strong match in the <strong>${currentTopic}</strong> FAQ database.</div>
          <div class="no-match">⚠ Score below threshold (${match?(match.score*100).toFixed(1):0}% &lt; 8%). Try rephrasing or switch topics.</div>
          <div class="nlp-card">
            <div class="nlp-card-title">▸ NLP PIPELINE TRACE</div>
            <div class="nlp-tokens">${userTokens.map(t => `<span class="token ${STOP_WORDS.has(t)?'stop':''}">${t}</span>`).join('')}</div>
            <div style="margin-top:6px;color:var(--muted);font-size:10px">Stemmed: ${userStemmed.join(', ')||'—'} · Best score: ${match?match.score.toFixed(4):'0.0000'}</div>
          </div>
          <div class="msg-meta">${getTime()}</div>
        </div>
      </div>`;
  }

  area.innerHTML += responseHTML;
  scrollToBottom();
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

addWelcome();
</script>
</body>
</html>
